# llm-bench benchmark config. The runner reads this from the repo root (or --config).
#
# llm:
  # Admin token for corrallm's control surface (/api/v1/models/{load,unload}).
  # ONLY needed by probes declaring `run: cold|warm|both` — a plain quality
  # benchmark runs without it. Without a token those probes still run, but each
  # row is stamped with a warning that residency was not controlled, so a cold
  # claim is never made on evidence that does not support it.
  # When corrallm SPAWNS this bench (UI-driven run), it injects the run key as
  # CORRALLM_BENCH_KEY — the credential that keeps this run served while every
  # other caller is locked out. Point apiKeyEnv at it so a spawned run and a
  # hand-run CLI invocation behave identically.
  #   apiKeyEnv: CORRALLM_BENCH_KEY
  # adminTokenFile: /home/you/ml-kit/home/admin.token
  # adminTokenEnv: CORRALLM_ADMIN_TOKEN the corrallm endpoint. apiKeyEnv names the env var holding the bearer
# key — the fair-share SCHEDULING IDENTITY (map a `llm-bench` key to corrallm's
# batch group so runs queue behind interactive traffic). Empty env = no auth.
llm:
  baseURL: "http://192.168.1.76:8111"
  apiKeyEnv: LLM_BENCH_LLM_KEY

# Models under test (candidates). Qwen3-6-27B-MPT is intentionally excluded as
# a candidate (fills the 5090) — it is only a P1 judge.
# Default candidate set, in run order. Qwen last: its 29.5GB admission evicts
# the others (corrallm handles the swap). --models overrides both set AND order.
models:
  - gemma-4-12b
  - ternary-bonsai-27b
  - Qwen3-6-27B-MPT

# P1 judge phase. The judge runs on corrallm's `chat` lane (may cold-load Qwen),
# which is why it runs AFTER all candidates finish. Judge scores annotate; they
# never decide pass/fail. Off by default in `run` — enable with `--judge` or
# run `llm-bench judge -run out/<ts>` standalone.
judge:
  model: "chat"
  maxTranscriptBytes: 65536

# Toolsets are the second experiment axis: each is a list of EXTRA MCP servers
# spawned alongside llm-bench-mcp. "{{workspace}}" in an arg is replaced with the
# run's scratch workspace path. Verified invocations (2026-07-15):
#   mcpshell:     `mcpshell mcp`                       (github.com/iodesystems/mcpshell/cmd/mcpshell)
#   poly-lsp-mcp: `poly-lsp-mcp mcp --root <workspace>` (github.com/iodesystems/poly-lsp-mcp)
# bin/llm-bench builds both into local/bin/, which should be on $PATH when running.
toolsets:
  baseline: []
  mcpshell:
    - cmd: mcpshell
      args: ["mcp"]
  # poly-lsp owns read/edit/navigate (node_read + node_edit + `structure` dir
  # tours) — cede llm-bench-mcp's read_file/write_file/list_dir so the model sees
  # ONE convention, not near-matching duplicates (write_file{path,content} vs
  # node_edit{file,newText}). Only `run` stays: executing is poly-lsp's one gap.
  polylsp:
    cedeFileTools: true
    servers:
      - cmd: poly-lsp-mcp
        args: ["mcp", "--root", "{{workspace}}"]
  # Read-only poly-lsp: navigation + reading, no mutating tools registered.
  # 2 tools (~620 tok) vs 3 (~990). For exploration/review, a tool the model
  # cannot see is a tool it cannot call — enforcement, not an instruction.
  #
  # cedeFileTools is FALSE here, unlike the other poly-lsp sets: read-only has no
  # node_edit, so ceding write_file too would leave nothing able to write at all.
  # This is also the ADD-ON shape nothing else covers — poly-lsp alongside the
  # normal file tools rather than replacing them: explore semantically, write
  # with write_file.
  polylsp-ro:
    cedeFileTools: false
    servers:
      - cmd: poly-lsp-mcp
        args: ["mcp", "--root", "{{workspace}}", "--read-only"]
  # polylsp + edit validation. node_edit runs the child LSP after each write and
  # REVERTS any edit that introduces a NEW error (revert-on-new-diagnostics).
  # Byte-identical to `polylsp` except the --validate flag, so a
  # polylsp-vs-polylsp-validate diff isolates EDIT SAFETY as the single variable
  # (the `edit-safety` group). Requires poly-lsp-mcp's --validate build.
  polylsp-validate:
    cedeFileTools: true
    servers:
      - cmd: poly-lsp-mcp
        args: ["mcp", "--root", "{{workspace}}", "--validate"]
  # The 9-tool surface the 3-tool one replaced. Identical to `polylsp` in
  # every other respect, so a polylsp-vs-polylsp-legacy diff isolates the
  # SURFACE — which is the thing under test. The 9 tools bill ~4327
  # tokens of definitions on every single turn against the 3 tools' ~900,
  # and 55% of that bought 4% of actual usage.
  polylsp-legacy:
    cedeFileTools: true
    servers:
      - cmd: poly-lsp-mcp
        args: ["mcp", "--root", "{{workspace}}", "--legacy-tools"]
  # full = mcpshell (eval, distinct interface — keeps file tools) + poly-lsp.
  # Cede too: poly-lsp's node_edit is the near-match that confuses the model.
  full:
    cedeFileTools: true
    servers:
      - cmd: mcpshell
        args: ["mcp"]
      - cmd: poly-lsp-mcp
        args: ["mcp", "--root", "{{workspace}}"]

# experiments: the A/B layer over (task x toolset). Each renders tasks x variants
# into individual bench cases TAGGED {group, name(=task), variant(=id), label},
# so a report pivots on (group, name) with variants as columns. One RULE for a
# valid A/B: everything but the variant is held constant (same task, prompt,
# checks, model, budget) — a variant may override ONLY the toolset/server config.
# One DISCIPLINE: each group isolates ONE factor, named by the group.
#
# NOT YET PARSED — needs a Config.Experiments field + a render step in
# internal/bench/run (expand experiments -> the model x variant x task matrix)
# and Group/Variant/Label added to the Result key (today: model/toolset/task).
# Until then, run the same comparison directly:
#   llm-bench run --tasks edit-safety-pop --toolsets polylsp,polylsp-validate
#
# experiments:
#   - group: edit-safety          # isolates: does revert-on-new-diagnostics lift success?
#     tasks: [edit-safety-pop]     # the `name` axis (add more single-node edit tasks here)
#     variants:                    # the A/B(/C+) axis; A is the control by convention
#       - id: A
#         label: polylsp           # unvalidated node_edit
#         toolset: polylsp
#       - id: B
#         label: polylsp+validate  # revert-on-new-diagnostics
#         toolset: polylsp-validate
#         # inline override form (instead of a named toolset) — same effect:
#         # serverArgs: { poly-lsp-mcp: ["mcp","--root","{{workspace}}","--validate"] }
