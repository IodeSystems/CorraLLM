name: cross-language-rename
class: tooluse
workspace: fixture/
# Favors poly-lsp: the SAME logical field appears in three languages with
# language-appropriate casing — Go `LegacyID` (+ json tag `legacy_id`),
# TypeScript `legacyId`, YAML `legacy_id`. poly-lsp's cross-language node
# addressing links the representations; baseline must hunt each file by hand and
# tends to miss one casing. Checks assert new names present AND old names gone in
# every file (! negation runs via `sh -c`).
limits: { maxTurnsPerStage: 12, maxToolCallsPerStage: 30 }
stages:
  - prompt: |
      The field currently spelled `legacy_id` / `LegacyID` / `legacyId` is being
      renamed to `archived_id` / `ArchivedID` / `archivedId`. Update ALL of its
      representations so the Go struct (model.go, including its JSON tag), the
      TypeScript interface (client.ts), and the config (config.yaml) stay
      consistent, each using its language's casing.
    checks:
      # model.go: Go identifier + JSON tag renamed, old forms gone.
      - cmd_ok: "grep -q ArchivedID model.go"
      - cmd_ok: "grep -q archived_id model.go"
      - cmd_ok: "! grep -q LegacyID model.go"
      - cmd_ok: "! grep -q legacy_id model.go"
      # client.ts: camelCase renamed, old form gone.
      - cmd_ok: "grep -q archivedId client.ts"
      - cmd_ok: "! grep -q legacyId client.ts"
      # config.yaml: snake_case renamed, old form gone.
      - cmd_ok: "grep -q archived_id config.yaml"
      - cmd_ok: "! grep -q legacy_id config.yaml"
