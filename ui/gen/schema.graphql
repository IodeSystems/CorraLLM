schema {
  query: Query
}

directive @derived(operationId: String) on FIELD_DEFINITION | OBJECT | INPUT_OBJECT | INPUT_FIELD_DEFINITION | ENUM | SCALAR | UNION | INTERFACE | ARGUMENT_DEFINITION

type CorrallmQueryNamespace {
  configSummary: corrallm_ConfigSummaryOutputBody @derived(operationId: "configSummary")
  health: corrallm_HealthOutputBody @derived(operationId: "health")
  lanes: corrallm_LanesOutputBody @derived(operationId: "lanes")
  recentActivity(
    """Max records, newest first."""
    limit: Long
  ): corrallm_RecentActivityOutputBody @derived(operationId: "recentActivity")
  residency: corrallm_ResidencyOutputBody @derived(operationId: "residency")
  usageByKey(
    """Trailing window in hours; 0 = all time."""
    windowHours: Long
  ): corrallm_UsageByKeyOutputBody @derived(operationId: "usageByKey")
  usageRollup(
    """Trailing window in hours; 0 = all time."""
    windowHours: Long
  ): corrallm_UsageRollupOutputBody @derived(operationId: "usageRollup")
  usageSeries(
    """Bucket width in minutes."""
    bucketMinutes: Long
    """Trailing window in hours."""
    windowHours: Long
  ): corrallm_UsageSeriesOutputBody @derived(operationId: "usageSeries")
  v1: CorrallmV1QueryNamespace!
}

type CorrallmV1QueryNamespace {
  configSummary: corrallm_ConfigSummaryOutputBody @derived(operationId: "configSummary")
  health: corrallm_HealthOutputBody @derived(operationId: "health")
  lanes: corrallm_LanesOutputBody @derived(operationId: "lanes")
  recentActivity(
    """Max records, newest first."""
    limit: Long
  ): corrallm_RecentActivityOutputBody @derived(operationId: "recentActivity")
  residency: corrallm_ResidencyOutputBody @derived(operationId: "residency")
  usageByKey(
    """Trailing window in hours; 0 = all time."""
    windowHours: Long
  ): corrallm_UsageByKeyOutputBody @derived(operationId: "usageByKey")
  usageRollup(
    """Trailing window in hours; 0 = all time."""
    windowHours: Long
  ): corrallm_UsageRollupOutputBody @derived(operationId: "usageRollup")
  usageSeries(
    """Bucket width in minutes."""
    bucketMinutes: Long
    """Trailing window in hours."""
    windowHours: Long
  ): corrallm_UsageSeriesOutputBody @derived(operationId: "usageSeries")
}

"""64-bit integer encoded as a decimal string to preserve precision past 2^53. Accepts a JSON number or a decimal string as input."""
scalar Long

type Query {
  corrallm: CorrallmQueryNamespace!
}

type corrallm_ActivityRecord {
  """Backend that handled it."""
  backend: String!
  """Metered completion tokens."""
  completionTokens: Long!
  """Resolved request cost in USD."""
  costUsd: Float!
  """Time in request, milliseconds."""
  dwellMs: Long!
  """Caller identity."""
  key: String!
  """Request path."""
  path: String!
  """Metered prompt tokens."""
  promptTokens: Long!
  """Served model name."""
  served: String!
  """HTTP status."""
  status: Long!
  """Unix millis when the request was logged."""
  ts: Long!
}

type corrallm_BackendLoadView {
  """Slots in use."""
  active: Long!
  """Backend id."""
  backend: String!
  """Configured slots."""
  capacity: Long!
  """Per-group breakdown."""
  groups: [corrallm_GroupLoadView!]!
  """Queued requests."""
  waiting: Long!
}

type corrallm_ConfigSummaryOutputBody {
  """Served model names."""
  models: [String!]!
  """Configured priority group names."""
  priorityGroups: [String!]!
  """Declared server names."""
  servers: [String!]!
}

type corrallm_GroupLoadView {
  """In-flight slots."""
  active: Long!
  """Priority group name."""
  group: String!
  """Queued requests."""
  waiting: Long!
}

type corrallm_GroupView {
  """In-flight slots across all backends."""
  active: Long!
  """May a higher group preempt it?"""
  interruptible: Boolean!
  """Priority group name."""
  name: String!
  """requests|dwell|cost."""
  shareCurrency: String!
  """Queued requests across all backends."""
  waiting: Long!
  """Fairshare weight (effective)."""
  weight: Long!
}

type corrallm_HealthOutputBody {
  """Always "ok" when the process is serving."""
  status: String!
  """Build version stamp."""
  version: String!
}

type corrallm_KeySeries {
  """Caller key (empty = unkeyed)."""
  key: String!
  """One point per bucket, aligned to Buckets."""
  points: [corrallm_SeriesPoint!]!
}

type corrallm_KeyUsageRow {
  """Total completion tokens."""
  completionTokens: Long!
  """Total cost, USD."""
  costUsd: Float!
  """Total time in request, milliseconds."""
  dwellMs: Long!
  """Energy in kWh (cost / costPerKwh; 0 if rate unset)."""
  energyKwh: Float!
  """Caller key (empty = unkeyed)."""
  key: String!
  """Total prompt tokens."""
  promptTokens: Long!
  """Request count."""
  requests: Long!
}

type corrallm_LanesOutputBody {
  """Per-backend live load."""
  backends: [corrallm_BackendLoadView!]!
  """Priority groups with aggregated load."""
  groups: [corrallm_GroupView!]!
}

type corrallm_PoolUsageView {
  """Reserved bytes."""
  bytes: Long!
  """Pool name."""
  pool: String!
}

type corrallm_PoolView {
  """Bytes available to spawned backends (total − reserve)."""
  budget: Long!
  """Pool name (gpu0, system, …)."""
  pool: String!
  """Bytes currently reserved by resident backends."""
  used: Long!
}

type corrallm_RecentActivityOutputBody {
  """Activity rows, newest first."""
  records: [corrallm_ActivityRecord!]!
}

type corrallm_ResidencyOutputBody {
  """Currently resident backends."""
  models: [corrallm_ResidentModelView!]!
  """Per-server pool budget/usage."""
  servers: [corrallm_ServerView!]!
}

type corrallm_ResidentModelView {
  """Unix millis of last use, 0 if never."""
  lastUsedMs: Long!
  """Served model name."""
  modelName: String!
  """Backend id (<servedModel>#<index>)."""
  name: String!
  """Pinned: exempt from eviction."""
  persistent: Boolean!
  """In-flight requests holding it."""
  refs: Long!
  """Server, empty for pure-proxy."""
  server: String!
  """absent|loading|ready|failed|evicting."""
  state: String!
  """Per-pool reservation."""
  usage: [corrallm_PoolUsageView!]!
}

type corrallm_RollupRow {
  """Total completion tokens."""
  completionTokens: Long!
  """Total cost, USD."""
  costUsd: Float!
  """Total dwell, milliseconds."""
  dwellMs: Long!
  """Total prompt tokens."""
  promptTokens: Long!
  """Request count."""
  requests: Long!
  """Served model name."""
  served: String!
}

type corrallm_SeriesPoint {
  """Cost in this bucket, USD."""
  costUsd: Float!
  """Total dwell in this bucket, ms."""
  dwellMs: Long!
  """Energy in this bucket, kWh (cost/costPerKwh)."""
  energyKwh: Float!
  """Requests in this bucket."""
  requests: Long!
}

type corrallm_ServerView {
  """Per-pool budget/usage."""
  pools: [corrallm_PoolView!]!
  """Server name."""
  server: String!
}

type corrallm_UsageByKeyOutputBody {
  """Per-key usage, costliest first."""
  rows: [corrallm_KeyUsageRow!]!
  """Window applied (0 = all time)."""
  windowHours: Long!
}

type corrallm_UsageRollupOutputBody {
  """Per-model usage, costliest first."""
  rows: [corrallm_RollupRow!]!
  total: corrallm_RollupRow!
  """Window applied (0 = all time)."""
  windowHours: Long!
}

type corrallm_UsageSeriesOutputBody {
  """Effective bucket width (may be coarsened)."""
  bucketMinutes: Long!
  """Bucket start times, unix millis, ascending."""
  buckets: [Long!]!
  """Per-key dense series, costliest first."""
  keys: [corrallm_KeySeries!]!
}
