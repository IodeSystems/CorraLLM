type corrallm_ActivityRecord {
  """Backend that handled it."""
  backend: String!
  """Metered completion tokens."""
  completionTokens: Long!
  """Resolved request cost in USD."""
  costUsd: Float!
  """Time in request, milliseconds."""
  dwellMs: Long!
  """Caller identity."""
  key: String!
  """Request path."""
  path: String!
  """Metered prompt tokens."""
  promptTokens: Long!
  """Served model name."""
  served: String!
  """HTTP status."""
  status: Long!
  """Unix millis when the request was logged."""
  ts: Long!
}

type corrallm_ConfigSummaryOutputBody {
  """Served model names."""
  models: [String!]!
  """Configured priority group names."""
  priorityGroups: [String!]!
  """Declared server names."""
  servers: [String!]!
}

type corrallm_HealthOutputBody {
  """Always "ok" when the process is serving."""
  status: String!
  """Build version stamp."""
  version: String!
}

type corrallm_PoolUsageView {
  """Reserved bytes."""
  bytes: Long!
  """Pool name."""
  pool: String!
}

type corrallm_PoolView {
  """Bytes available to spawned backends (total − reserve)."""
  budget: Long!
  """Pool name (gpu0, system, …)."""
  pool: String!
  """Bytes currently reserved by resident backends."""
  used: Long!
}

type corrallm_RecentActivityOutputBody {
  """Activity rows, newest first."""
  records: [corrallm_ActivityRecord!]!
}

type corrallm_ResidencyOutputBody {
  """Currently resident backends."""
  models: [corrallm_ResidentModelView!]!
  """Per-server pool budget/usage."""
  servers: [corrallm_ServerView!]!
}

type corrallm_ResidentModelView {
  """Unix millis of last use, 0 if never."""
  lastUsedMs: Long!
  """Served model name."""
  modelName: String!
  """Backend id (<servedModel>#<index>)."""
  name: String!
  """Pinned: exempt from eviction."""
  persistent: Boolean!
  """In-flight requests holding it."""
  refs: Long!
  """Server, empty for pure-proxy."""
  server: String!
  """absent|loading|ready|failed|evicting."""
  state: String!
  """Per-pool reservation."""
  usage: [corrallm_PoolUsageView!]!
}

type corrallm_ServerView {
  """Per-pool budget/usage."""
  pools: [corrallm_PoolView!]!
  """Server name."""
  server: String!
}
