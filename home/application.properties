# corrallm base config (committed). Operator knobs read via os.Getenv.
# Layered overrides: secret.properties, <slot>.properties, <slot>.local.properties,
# <slot>.secret.properties (later wins). OS env overrides all.

# HTTP listen address.
ADDR=:6502

# Path to the corrallm YAML domain config (servers/models/groups/costs).
CORRALLM_CONFIG=./corrallm.yaml

# SQLite database (activity log + metric rollups).
CORRALLM_DB=./home/var/corrallm.db
