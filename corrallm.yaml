# corrallm domain config — the scheduler's declarative source of truth.
# P0 parses and validates this shape; later phases give each section behavior.
# See plan/plan.md §3 for the full schema.

# Configurable; converts local energy → $ (cost model, P6).
costPerKwh: 0.14

commandCosts:
  local:
    generateWattsPerToken: 0.9
    processWattsPerToken: 0.3
  claude:
    extract:
      costFactor: 0.8

# Host capacity as a vector over named memory pools.
servers:
  box1:
    pools: { gpu0: 24GB, system: 128GB }
    reserve: { system: 16GB }
    maxConcurrent: 4

# Served model → residency policy + ordered backend list.
models:
  qwen3-coder:
    sticky: { ttl: "5m", evictCost: high }
    backends:
      - cmd: "llama-server -m qwen3-coder.gguf -ngl 60"
        server: box1
        ramUsage: { gpu0: 16GB, system: 8GB }
        swap: { loadSeconds: 18 }
        proxy: 8081
        type: local
        quality: 100
      # Pure-proxy paid fallback (no cmd, remote target with auth headers).
      - proxy: { host: api.anthropic.com, port: 443, headers: { authorization: "Bearer ${ANTHROPIC_API_KEY}" } }
        type: claude
        quality: 90

# A key maps to exactly one priorityGroup; the group bundles all policy.
priorityGroups:
  interactive:
    weight: 10
    interruptible: false
    onSaturated:
      local: { preempt: true, then: fallThrough }
      claude: { spill: true, limits: { cost: "$20/hr" } }
      default: reject
  batch:
    weight: 1
    interruptible: true
    onSaturated:
      local: { queue: true }
      default: reject
    limits: { dwell: "600s/min" }
  default:
    weight: 1
    onSaturated: { default: reject }

keys:
  aw3: interactive
  ragtag: batch
